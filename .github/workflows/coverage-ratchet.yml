name: Coverage Ratchet

# Runs after every push to main (i.e. after a PR squash-merges) and any time
# triggered manually. Re-runs the unit tests with coverage, then bumps the
# vitest.config.ts thresholds up to the new measured floor if (and only if)
# coverage has improved. Opens a PR with the change — never lowers a
# threshold, never auto-merges.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: coverage-ratchet
  cancel-in-progress: false

jobs:
  ratchet:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Pass the head-commit message through env to avoid running it through
    # the shell as an unquoted expression — the safe pattern flagged by the
    # GH Actions injection-prevention guide. Used in the loop-break check.
    env:
      HEAD_COMMIT_MSG: ${{ github.event.head_commit.message || '' }}

    steps:
      - name: Skip if this is the bot's own ratchet commit
        id: skip
        run: |
          set -euo pipefail
          if [ "${HEAD_COMMIT_MSG#chore(ci): ratchet coverage}" != "$HEAD_COMMIT_MSG" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.skip.outputs.skip != 'true'

      - uses: actions/setup-node@v6
        if: steps.skip.outputs.skip != 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
        if: steps.skip.outputs.skip != 'true'

      - name: Unit tests with coverage (json-summary)
        if: steps.skip.outputs.skip != 'true'
        run: npx vitest run --coverage --coverage.reporter=json-summary --coverage.reporter=text

      - name: Ratchet coverage thresholds
        id: ratchet
        if: steps.skip.outputs.skip != 'true'
        run: node scripts/ratchet-coverage.mjs

      - name: Open PR if thresholds bumped
        if: steps.skip.outputs.skip != 'true' && steps.ratchet.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(ci): ratchet coverage thresholds to new floor"
          branch: chore/coverage-ratchet-bump
          delete-branch: true
          title: "chore(ci): ratchet coverage thresholds to new floor"
          body: |
            Auto-generated by `.github/workflows/coverage-ratchet.yml`.

            Measured coverage is above the floor encoded in
            `vitest.config.ts` thresholds. Bumping each metric to the
            new integer floor so future regressions fail CI. Never
            lowers a threshold.

            See workflow run for the exact before/after summary.
          labels: |
            ci
            coverage
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
