name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # Nightly at 6am UTC — full lint/typecheck/unit/E2E suite
  workflow_dispatch:

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      # E2E tests depend on live Wix API. GitHub Actions runners consistently
      # miss the Wix API response window on PR builds (network path is slow).
      # Retries are already configured (2x in playwright.config.ts) and still
      # fail. E2E runs on nightly schedule and manual dispatch only — PRs get
      # lint + typecheck + unit which is sufficient signal for code regressions.
      # Dependabot PRs also skip E2E since they don't receive repository secrets.
      - name: Install Playwright browsers
        if: github.event_name != 'pull_request' && github.actor != 'dependabot[bot]'
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        if: github.event_name != 'pull_request' && github.actor != 'dependabot[bot]'
        run: npx playwright test
        env:
          WIX_CLIENT_ID_HEADLESS: ${{ secrets.WIX_CLIENT_ID_HEADLESS }}
          WIX_BACKEND_KEY: ${{ secrets.WIX_BACKEND_KEY }}
          WIX_VELO_SITE_URL: ${{ secrets.WIX_VELO_SITE_URL }}
          WIX_WEBHOOK_SECRET: ${{ secrets.WIX_WEBHOOK_SECRET }}
          SESSION_COOKIE_SECRET: ${{ secrets.SESSION_COOKIE_SECRET }}
