version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
      time: "08:00"
      timezone: America/New_York
    labels:
      - dependencies
    open-pull-requests-limit: 10
    rebase-strategy: auto
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      next-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "eslint-config-next"
        update-types:
          - minor
          - patch
      wix-sdk:
        patterns:
          - "@wix/*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "@wix/*"
        update-types:
          - version-update:semver-major
      - dependency-name: "next"
        update-types:
          - version-update:semver-major
      - dependency-name: "react"
        update-types:
          - version-update:semver-major
      - dependency-name: "react-dom"
        update-types:
          - version-update:semver-major
      # eslint v10 breaks eslint-plugin-react (context.getFilename removed).
      # Hold until eslint-config-next pins a v10-compatible plugin set.
      # See PR #21 for failure details.
      - dependency-name: "eslint"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/New_York
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
    open-pull-requests-limit: 5
